name: Monthly preference profile

on:
  schedule:
    # 11:07 UTC on the 1st of every month.
    - cron: "7 11 1 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      GOOGLE_CALENDAR_IDS: ${{ secrets.GOOGLE_CALENDAR_IDS }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # These are required by Settings validation but unused by --profile:
      TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      NEWSLETTER_FROM_EMAIL: ${{ secrets.NEWSLETTER_FROM_EMAIL }}
      NEWSLETTER_TO_EMAILS: ${{ secrets.NEWSLETTER_TO_EMAILS }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build preference profile
        run: uv run python -m newsletter.main --profile

      - name: Compute month tag
        id: month
        run: echo "value=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Save preferences cache
        uses: actions/cache/save@v4
        with:
          path: data/preferences.json
          # Per-run key keeps this monthly run distinct; weekly workflow restores
          # via `restore-keys: preferences-v1-` which prefix-matches the latest.
          key: preferences-v1-${{ steps.month.outputs.value }}-${{ github.run_id }}
